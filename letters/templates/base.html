<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Default Title{% endblock %}</title>
    <!-- CSS나 meta 태그 추가 -->
    <link rel="stylesheet" href='../../static/css/style.css'>
        <style type="text/css">
            body{
                background: #013134;
            }
            label{
                color: #FDFFEC;
                font-family: 'hanna';
                font-size: 55px;
                font-style: normal;
                font-weight: 400;
                line-height: normal;
                display: inline-block;
            }
			input:active{
				transform: scale(0.9);
				transition: transform 0.3s ease;
			}
			input{
				z-index: 1;
				color: #FDFFEC;
				font-family: 'hanna';
				font-size: 55px;
				font-style: normal;
				font-weight: 400;
				line-height: normal;
				border: none;
				background: none;
				background-size: cover;
				width:200px;
	
			}
            .textbox{
                width: 399px;
                height: 35px;
                border-radius: 135.5px;
                background-color: #FDFFEC;
                font-size: 55px;
                font-family: 'hanna';
                padding: 20px;
			}
			.content {
				max-width:500px;
				margin: auto;
				padding:10px;
			}

			.header {
				text-align: center;
			}
			.letter_for_read {
				width: 100%;
				background-color:#f1f1f1;
			}

			#title {
				height: 32px;
				width: 100%;
				border-radius: 0.5em;
				border: none;
				font-family: inherit;
				font-size: inherit;
				background: none;
			}
			textarea {
				width: 100%;
				font-family: inherit;
				font-size: 100%;
				resize: none;
				border-radius: 0.5em;
				padding-block: 10px;
				border: 0px;
				background: none;
			}

			.td_title {
				background-color: #d8d8d8
			}
			@media only screen and (max-width: 1100px) {
				/* 모바일 화면에 대한 스타일 지정 */
				body {
					
				}
			}
			/*
			@media only screen and (min-width: 601px) and (max-width: 1024px) {
			/* 태블릿 화면에 대한 스타일 지정 
			}
			*/
			
			
			@media only screen and (min-width: 1500px) {
			/* 데스크탑 화면에 대한 스타일 지정 */
				body{
					background-color: lightblue;
				}
				
			}
    </style>
	{% block style %}
			<!-- style -->
	{% endblock %}
</head>
<body>
	{% block content %}
	<ul>
		{% block fail_reason %}
			<!-- 오류 표시 -->

		{% endblock %}
        {% block user_info %}
            <!-- 사용자 정보 표시 -->
        {% endblock %}
		{% block admin %}
			<!-- 어드민 권한만 접근 가능-->
		{% endblock %}
    </ul>
    <div class="etc">
        {% block etc %}
		
		{% endblock  %}
    </div>
	{% endblock content %}
    

    <!-- JavaScript 코드 -->
</body>
</html>
