{% extends "accounts_base.html" %}

{% block content %}
    <style type="text/css">
        .login-container {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
        }
        .label-input-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 10px; /* 각 라벨-인풋 쌍 사이의 간격 조절 */
            margin-right: 30px;
        }
        .login_label{
            color: #FDFFEC;
            font-family: 'hanna';
            font-size: 55px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
            width: 200px; /* 라벨의 너비 조절 */
            display: inline-block;
        }
        .textbox{
            width: 399px;
            height: 73px;
            border-radius: 135.5px;
            background: #FDFFEC;
            font-size: 55px;
            font-family: 'hanna';
            padding: 20px;
        }
        .logInBtn-container{
            background: url('/../static/img/logInBtn.png');
            background-size: cover;
            width:200px;
            height:200px;
            align-items: center;

        }
        .logInBtn{
            color: #FDFFEC;
            font-family: 'hanna';
            font-size: 55px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
            border: none;
            background: url('/../static/img/logInBtn.png');
            background-size: cover;
            width:200px;

        }
        .logInBtn:hover{
            
        }
    </style>

    <body>
        
        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            {% include "accounts/form_errors.html" %}
            <div class="login-container">
                <div class = "label-input-container">
                    <div class="id-container">
                        <label width= 200px class= "login_label">아이디</label>
                        <input class="textbox" type="text" name="username" id="username">
                    </div>
                    <div class="pwd-container">
                        <label class= "login_label">패스워드</label>
                        <input style="font-family:'serif'" class="textbox" type="password" name="password" id="password">
                    </div>
                </div>
                <div class = "logInBtn-container">
                    <input type="submit" value="로그인" class="logInBtn">
                </div>
            </div>
        </form>
    </body>

{% endblock  %}
